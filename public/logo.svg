<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" fill="none">
  <!-- Background pill -->
  <rect width="220" height="56" rx="10" fill="url(#bg)"/>

  <!-- Car icon -->
  <g transform="translate(10, 10)">
    <!-- Car body -->
    <rect x="2" y="20" width="34" height="14" rx="3" fill="#D4AF37"/>
    <!-- Car roof -->
    <path d="M8 20 L12 10 L26 10 L30 20Z" fill="#D4AF37"/>
    <!-- Windows -->
    <path d="M13 19 L15 12 L23 12 L25 19Z" fill="#0a1f4e" opacity="0.7"/>
    <!-- Wheels -->
    <circle cx="9" cy="34" r="4.5" fill="#0a1f4e"/>
    <circle cx="9" cy="34" r="2" fill="#D4AF37"/>
    <circle cx="27" cy="34" r="4.5" fill="#0a1f4e"/>
    <circle cx="27" cy="34" r="2" fill="#D4AF37"/>
    <!-- Headlight -->
    <rect x="35" y="22" width="3" height="5" rx="1" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- Brand text -->
  <text x="58" y="28" font-family="'Arial Black', Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="2" fill="url(#textGrad)">KREDİZMİR</text>

  <!-- Divider line -->
  <rect x="58" y="33" width="150" height="1.2" rx="1" fill="url(#lineGrad)" opacity="0.6"/>

  <!-- Subtitle -->
  <text x="59" y="46" font-family="Arial, sans-serif" font-size="8.5" font-weight="600" letter-spacing="3" fill="#D4AF37" opacity="0.9">TAŞIT FİNANSMANI</text>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="220" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0b2257"/>
      <stop offset="100%" stop-color="#0d1f3c"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="58" y1="0" x2="208" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="58" y1="0" x2="208" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
</svg>
